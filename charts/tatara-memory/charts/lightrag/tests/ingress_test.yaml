suite: ingress
templates:
  - templates/ingress.yaml
tests:
  - it: disabled by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders when enabled with host and tls
    set:
      ingress:
        enabled: true
        className: nginx
        host: lightrag.example.com
        pathPrefix: /lightrag
        tlsSecretName: lightrag-tls
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: spec.ingressClassName
          value: nginx
      - equal:
          path: spec.rules[0].host
          value: lightrag.example.com
      - equal:
          path: spec.tls[0].secretName
          value: lightrag-tls
  - it: nginx configuration-snippet is applied when supplied via annotations map
    set:
      ingress:
        enabled: true
        host: lightrag.example.com
        className: nginx
        annotations:
          nginx.ingress.kubernetes.io/rewrite-target: /$2
          nginx.ingress.kubernetes.io/configuration-snippet: "sub_filter '\"/webui' '\"/lightrag/webui';"
    asserts:
      - matchRegex:
          path: metadata.annotations["nginx.ingress.kubernetes.io/configuration-snippet"]
          pattern: "sub_filter '\"/webui'"
  - it: ingressClassName absent when className is empty (cluster-agnostic rule 14)
    set:
      ingress:
        enabled: true
        host: lightrag.example.com
    asserts:
      - notExists:
          path: spec.ingressClassName
  - it: cert-manager annotation absent when certManagerClusterIssuer is empty (cluster-agnostic rule 14)
    set:
      ingress:
        enabled: true
        host: lightrag.example.com
    asserts:
      - notExists:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
