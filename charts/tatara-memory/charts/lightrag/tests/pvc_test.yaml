suite: pvc
templates:
  - templates/pvc.yaml
tests:
  - it: renders by default without storageClassName (uses cluster default)
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: RELEASE-NAME-lightrag-data
      - equal:
          path: spec.accessModes[0]
          value: ReadWriteOnce
      - equal:
          path: spec.resources.requests.storage
          value: 10Gi
      - isNull:
          path: spec.storageClassName

  - it: storageClassName rendered when supplied by helmfile
    set:
      persistence:
        storageClass: rook-ceph
    asserts:
      - equal:
          path: spec.storageClassName
          value: rook-ceph

  - it: skipped when persistence.enabled=false
    set:
      persistence:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: skipped when persistence.existingClaim is set
    set:
      persistence:
        existingClaim: some-other-pvc
    asserts:
      - hasDocuments:
          count: 0
