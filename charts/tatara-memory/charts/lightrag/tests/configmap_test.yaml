suite: configmap
templates:
  - templates/configmap.yaml
tests:
  - it: renders all UPPER_SNAKE lightrag config keys
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-lightrag
      - isNotNullOrEmpty:
          path: data.LLM_BINDING
      - isNotNullOrEmpty:
          path: data.LLM_MODEL
      - isNotNullOrEmpty:
          path: data.EMBEDDING_BINDING
      - isNotNullOrEmpty:
          path: data.EMBEDDING_MODEL
      - isNotNullOrEmpty:
          path: data.EMBEDDING_DIM
      - isNotNullOrEmpty:
          path: data.LIGHTRAG_KV_STORAGE
      - isNotNullOrEmpty:
          path: data.LIGHTRAG_VECTOR_STORAGE
      - isNotNullOrEmpty:
          path: data.LIGHTRAG_GRAPH_STORAGE
      - isNotNullOrEmpty:
          path: data.LIGHTRAG_DOC_STATUS_STORAGE
      - isNotNullOrEmpty:
          path: data.NEO4J_URI
      - isNotNullOrEmpty:
          path: data.MAX_ASYNC
      - isNotNullOrEmpty:
          path: data.MAX_PARALLEL_INSERT
      - isNotNullOrEmpty:
          path: data.EMBEDDING_FUNC_MAX_ASYNC
      - isNotNullOrEmpty:
          path: data.POSTGRES_HOST
      - isNotNullOrEmpty:
          path: data.POSTGRES_PORT
      - isNotNullOrEmpty:
          path: data.POSTGRES_DATABASE
      - isNotNullOrEmpty:
          path: data.POSTGRES_USER
      - equal:
          path: data.LIGHTRAG_KV_STORAGE
          value: PGKVStorage
  - it: rejects unexpected kebab-case keys (sanity guard)
    asserts:
      - isNull:
          path: data.llm-binding
      - isNull:
          path: data.kv-storage
