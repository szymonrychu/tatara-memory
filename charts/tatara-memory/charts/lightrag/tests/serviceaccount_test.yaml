suite: serviceaccount
templates:
  - templates/serviceaccount.yaml
tests:
  - it: renders by default
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-lightrag
  - it: skips when serviceAccount.create=false
    set:
      serviceAccount:
        create: false
    asserts:
      - hasDocuments:
          count: 0
