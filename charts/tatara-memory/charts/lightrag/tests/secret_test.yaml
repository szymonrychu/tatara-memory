suite: secret
templates:
  - templates/secret.yaml
tests:
  - it: no Secret rendered when all three existingSecret values are set (defaults)
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a Secret when openai existingSecret is empty and value is supplied
    set:
      secrets:
        openai:
          existingSecret: ""
          existingSecretKey: lightrag-openai-api-key
          value: sk-test-not-real
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: type
          value: Opaque
      - isNotNullOrEmpty:
          path: data.lightrag-openai-api-key
      # stringData must not exist (values go through b64enc into data, not plaintext stringData)
      - isNull:
          path: stringData

  - it: kebab-case keys only, no camelCase leakage
    set:
      secrets:
        openai:
          existingSecret: ""
          value: sk-x
        postgres:
          existingSecret: ""
          value: pw-x
        neo4j:
          existingSecret: ""
          value: pw-y
    asserts:
      - isNotNullOrEmpty:
          path: data.lightrag-openai-api-key
      - isNotNullOrEmpty:
          path: data.postgres-password
      - isNotNullOrEmpty:
          path: data.neo4j-password
      - isNull:
          path: data.openaiApiKey
      - isNull:
          path: data.postgresPassword
