nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/hkuds/lightrag
  tag: v1.4.16
  digest: sha256:67ccf8d9f74eb29da872bf8b3e6513605f5ac601fb0509c5b0ca16d98d2d307d
  pullPolicy: IfNotPresent
  # pullSecretName is cluster-specific; the deploying helmfile supplies it.
  pullSecretName: ""

# LightRAG runtime configuration. Each scalar becomes a kebab-case
# key in the rendered ConfigMap and is exported into the pod via
# envFrom (UPPER_SNAKE upstream env name derived from the kebab key).
llmBinding: openai
llmModel: gpt-4.1-mini
embeddingBinding: openai
embeddingModel: text-embedding-3-small
embeddingDim: "1536"
kvStorage: PGKVStorage
vectorStorage: PGVectorStorage
graphStorage: Neo4JStorage
docStatusStorage: PGDocStatusStorage
neo4jUri: neo4j://tatara-neo4j:7687
maxAsync: "8"
maxParallelInsert: "8"
embeddingFuncMaxAsync: "8"
postgresHost: tatara-lightrag-database-cluster-rw
postgresPort: "5432"
postgresDatabase: lightrag
postgresUser: lightrag

# Secret references. When existingSecret is set the chart references it
# directly; when empty, the chart renders its own Secret using value.
secrets:
  openai:
    existingSecret: ""
    existingSecretKey: api-key
    value: ""
  postgres:
    # existingSecret must be supplied by the deploying helmfile (cluster-specific).
    existingSecret: ""
    existingSecretKey: password
    value: ""
  neo4j:
    # existingSecret must be supplied by the deploying helmfile (cluster-specific).
    existingSecret: ""
    existingSecretKey: password
    value: ""

service:
  type: ClusterIP
  port: 9621

ingress:
  enabled: false
  className: ""
  host: ""
  pathPrefix: /lightrag
  tlsSecretName: ""
  certManagerClusterIssuer: ""
  # annotations is a free-form map populated by the deploying helmfile.
  # Example for ingress-nginx + path-rewriting:
  #   nginx.ingress.kubernetes.io/rewrite-target: /$2
  #   nginx.ingress.kubernetes.io/use-regex: "true"
  #   nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
  #   nginx.ingress.kubernetes.io/configuration-snippet: |
  #     sub_filter_once off; ...
  # Note: configuration-snippet requires allow-snippet-annotations=true on the controller.
  annotations: {}

persistence:
  enabled: true
  # storageClass: "" uses the cluster default. The deploying helmfile supplies
  # the cluster-specific class (e.g. rook-ceph) per hard rule 14.
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  existingClaim: ""

resources:
  requestsCpu: 200m
  requestsMemory: 512Mi
  limitsMemory: 1Gi

serviceAccount:
  create: true
  name: ""

networkPolicy:
  enabled: true
  postgresPort: 5432
  neo4jPort: 7687
  # postgresClusterName is the value of the cnpg.io/cluster label on the cnpg pods.
  # Must be supplied by the deploying helmfile; there is no safe default.
  postgresClusterName: ""
  # neo4jName is the value of the helm.neo4j.com/neo4j.name label on the neo4j pod.
  # Must be supplied by the deploying helmfile; there is no safe default.
  neo4jName: ""

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 65532

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]

# serviceMonitor removed: upstream LightRAG (FastAPI) does not expose a
# Prometheus /metrics endpoint. Add it back when/if a prometheus exporter
# is integrated into the LightRAG deployment.
