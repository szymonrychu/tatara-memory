suite: helpers envConfig
templates:
  - configmap.yaml
release:
  name: tm
  namespace: tatara
tests:
  - it: renders UPPER_SNAKE keys from camelCase scalars
    set:
      httpAddr: ":8080"
      lightragBaseUrl: "http://tm-lightrag:9621"
      oidcIssuer: "https://auth.szymonrichert.pl/realms/master"
      oidcAudience: "tatara-memory"
      workerPoolSize: 4
      ingestItemTimeout: "5m"
      logLevel: "info"
      otlpEndpoint: ""
    asserts:
      - equal:
          path: data.HTTP_ADDR
          value: ":8080"
      - equal:
          path: data.LIGHTRAG_BASE_URL
          value: "http://tm-lightrag:9621"
      - equal:
          path: data.OIDC_ISSUER
          value: "https://auth.szymonrichert.pl/realms/master"
      - equal:
          path: data.OIDC_AUDIENCE
          value: "tatara-memory"
      - equal:
          path: data.WORKER_POOL_SIZE
          value: "4"
      - equal:
          path: data.INGEST_ITEM_TIMEOUT
          value: "5m"
      - equal:
          path: data.LOG_LEVEL
          value: "info"
      - equal:
          path: data.OTLP_ENDPOINT
          value: ""
