suite: prometheusrule
templates:
  - prometheusrule.yaml
release:
  name: tm
  namespace: tatara
tests:
  - it: skipped when disabled
    set:
      prometheusRule.enabled: false
    asserts:
      - hasDocuments:
          count: 0
  - it: renders a PrometheusRule with the expected alerts
    set:
      prometheusRule.enabled: true
    asserts:
      - isKind:
          of: PrometheusRule
      - equal:
          path: metadata.name
          value: tm-tatara-memory
      - equal:
          path: metadata.namespace
          value: tatara
      - equal:
          path: spec.groups[0].name
          value: tatara-memory.rules
      - equal:
          path: spec.groups[0].rules[0].alert
          value: MemoryDown
      - equal:
          path: spec.groups[0].rules[1].alert
          value: MemoryHigh5xx
      - equal:
          path: spec.groups[0].rules[2].alert
          value: MemoryLightragErrors
      - equal:
          path: spec.groups[0].rules[3].alert
          value: MemoryIngestJobsFailing
      - equal:
          path: spec.groups[0].rules[4].alert
          value: MemoryRetrievalLatencyHigh
      - equal:
          path: spec.groups[0].rules[5].alert
          value: MemoryHandlerPanics
  - it: deadman is always critical, others take severityLabel
    set:
      prometheusRule.enabled: true
      prometheusRule.severityLabel: page
    asserts:
      - equal:
          path: spec.groups[0].rules[0].labels.severity
          value: critical
      - equal:
          path: spec.groups[0].rules[1].labels.severity
          value: page
  - it: thresholds flow from values into the alert expressions
    set:
      prometheusRule.enabled: true
      prometheusRule.http5xxRatio: 0.1
      prometheusRule.retrievalLatencyP99Seconds: 3
    asserts:
      - matchRegex:
          path: spec.groups[0].rules[1].expr
          pattern: "> 0.1"
      - matchRegex:
          path: spec.groups[0].rules[4].expr
          pattern: "> 3"
  - it: merges additionalLabels onto the rule metadata
    set:
      prometheusRule.enabled: true
      prometheusRule.additionalLabels:
        release: kube-prometheus-stack
    asserts:
      - equal:
          path: metadata.labels.release
          value: kube-prometheus-stack
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: tatara-memory
