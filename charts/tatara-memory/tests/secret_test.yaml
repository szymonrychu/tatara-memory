suite: secret
templates:
  - secret.yaml
release:
  name: tm
  namespace: tatara
tests:
  - it: skips Secret entirely (no consumer for any key)
    set:
      existingSecret: ""
    asserts:
      - hasDocuments:
          count: 0
  - it: skips Secret when existingSecret is set
    set:
      existingSecret: my-external-secret
    asserts:
      - hasDocuments:
          count: 0
