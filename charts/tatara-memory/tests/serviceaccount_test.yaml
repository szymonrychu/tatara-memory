suite: serviceaccount
templates:
  - serviceaccount.yaml
release:
  name: tm
  namespace: tatara
tests:
  - it: renders a plain ServiceAccount with no annotations
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: tm-tatara-memory
      - isNull:
          path: metadata.annotations
