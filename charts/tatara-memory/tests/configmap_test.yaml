suite: configmap
templates:
  - configmap.yaml
release:
  name: tm
  namespace: tatara
tests:
  - it: renders ConfigMap with UPPER_SNAKE keys
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: tm-tatara-memory
      - isNotNullOrEmpty:
          path: data.HTTP_ADDR
      - isNotNullOrEmpty:
          path: data.LIGHTRAG_BASE_URL
      - isNotNullOrEmpty:
          path: data.OIDC_ISSUER
      - isNotNullOrEmpty:
          path: data.OIDC_AUDIENCE
      - isNotNullOrEmpty:
          path: data.WORKER_POOL_SIZE
      - isNotNullOrEmpty:
          path: data.INGEST_ITEM_TIMEOUT
      - isNotNullOrEmpty:
          path: data.LOG_LEVEL
  - it: rejects any kebab-case keys leaking through
    asserts:
      - isNull:
          path: data.http-addr
      - isNull:
          path: data.lightrag-base-url
      - isNull:
          path: data.oidc-issuer
