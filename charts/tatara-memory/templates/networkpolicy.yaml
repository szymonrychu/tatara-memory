{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tatara-memory.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tatara-memory.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tatara-memory.selectorLabels" . | nindent 6 }}
    {{- if .Values.eval.enabled }}
    # The eval CronJob pod (component=eval, issue #46) shares the app's selector
    # labels but has different, cluster-specific egress needs (the operator
    # push-receiver and a dedicated eval-target), which a cluster-agnostic chart
    # (rule 14) cannot encode. Exclude it from this API-server policy; governing
    # its egress is a deploy/NetworkPolicy concern. Deployment pods carry no
    # component label and so still match (NotIn admits the absent label).
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: NotIn
        values: ["eval"]
    {{- end }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: {{ .Values.networkPolicy.postgresClusterName | default (printf "%s-postgres" (include "tatara-memory.fullname" .)) }}
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              helm.neo4j.com/neo4j.name: {{ .Values.networkPolicy.neo4jName | default .Values.neo4j.neo4j.name }}
      ports:
        - port: 7687
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: lightrag
      ports:
        - port: 9621
          protocol: TCP
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - namespaceSelector: {}
      ports:
        - port: 443
          protocol: TCP
{{- end }}
