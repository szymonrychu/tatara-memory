apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tatara-memory.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tatara-memory.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tatara-memory.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tatara-memory.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include "tatara-memory.envConfig" . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "tatara-memory.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: tatara-memory
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "tatara-memory.fullname" . }}
            {{- if .Values.existingSecret }}
            - secretRef:
                name: {{ .Values.existingSecret }}
            {{- end }}
          env:
            # PG_DSN comes straight from the cnpg cluster's app secret;
            # cnpg packages user, password, host, port, db into a ready-to-use
            # URI key. Inline env here is the only practical way to project
            # one key (uri) under a custom env name (PG_DSN) without an extra
            # ExternalSecret operator. See MEMORY.md for the rationale.
            - name: PG_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pgPasswordSecret }}
                  key: uri
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
