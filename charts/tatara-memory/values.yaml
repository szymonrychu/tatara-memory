image:
  repository: harbor.szymonrichert.pl/containers/tatara-memory
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: regcred

replicaCount: 1

httpAddr: ":8080"
lightragBaseUrl: "http://tatara-memory-lightrag:9621"
oidcIssuer: "https://auth.szymonrichert.pl/realms/master"
oidcAudience: "tatara-memory"
workerPoolSize: 4
logLevel: "info"
otlpEndpoint: ""

pgHost: "tatara-memory-postgres-rw"
pgPort: 5432
pgDb: "tatara_memory"
pgUser: "tatara_memory"

# Secrets are provided by external Secret objects (cnpg-managed, SOPS,
# or ExternalSecret). Set existingSecret to override the default
# generated by templates/secret.yaml.
existingSecret: ""
pgPasswordSecret: "tatara-memory-postgres-app"
pgPasswordKey: "password"
oidcClientSecret: ""

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  host: ""
  clusterIssuer: letsencrypt-prod
  tlsSecretName: ""

serviceMonitor:
  enabled: true
  interval: "30s"
  scrapeTimeout: "10s"

networkPolicy:
  enabled: true

postgres:
  enabled: true
  # cnpg/cluster subchart values pass through to the postgres cluster.
  # tatara_memory + lightrag share ONE database to keep deploy simple;
  # pgvector ships with the cnpg postgres image. postInitApplicationSQL
  # runs on the tatara_memory database (as the app user) so the extension
  # lives where lightrag's vector store needs it.
  cluster:
    initdb:
      database: tatara_memory
      owner: tatara_memory
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS vector;

neo4j:
  enabled: true
  # neo4j chart requires `neo4j.name` and `volumes.data.mode` at top level.
  # Password value is provided via the SOPS-encrypted values overlay
  # (values/tatara-memory/default.secrets.yaml).
  # disableLookups: true tells the chart to skip its in-cluster regcred
  # lookup (helmfile template-mode breaks lookups); pre-created regcred
  # secret in the tatara namespace satisfies the imagePullSecret at runtime.
  disableLookups: true
  neo4j:
    name: tatara-neo4j
    edition: community
    acceptLicenseAgreement: "yes"
  image:
    imagePullSecrets:
      - regcred
    imageCredentials:
      - name: regcred
        registry: harbor.szymonrichert.pl
        username: placeholder
        password: placeholder
  volumes:
    data:
      mode: defaultStorageClass
      defaultStorageClass:
        requests:
          storage: 10Gi
  services:
    # neo4j chart's "default" service is named after the release (tatara-memory)
    # which collides with the tatara-memory app's own service of the same name.
    # Disable it; use the "neo4j" service (renamed via -lb-neo4j suffix) with
    # type=ClusterIP instead. Lightrag connects to bolt://tatara-neo4j-lb-neo4j:7687.
    default:
      enabled: false
    neo4j:
      enabled: true
      spec:
        type: ClusterIP
    admin:
      enabled: false
    internals:
      enabled: false

lightrag:
  enabled: true
  # Share the parent cluster's postgres + single application database.
  # Vector extension is pre-installed on the same db via postInitApplicationSQL.
  postgresHost: tatara-memory-postgres-rw
  postgresPort: "5432"
  postgresDatabase: tatara_memory
  postgresUser: tatara_memory
  neo4jUri: bolt://tatara-neo4j-lb-neo4j:7687
  secrets:
    openai:
      existingSecret: ""
      existingSecretKey: LLM_BINDING_API_KEY
      value: ""
    postgres:
      existingSecret: tatara-memory-postgres-app
      existingSecretKey: password
      value: ""
    neo4j:
      existingSecret: tatara-neo4j-password
      existingSecretKey: NEO4J_PASSWORD
      value: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi
