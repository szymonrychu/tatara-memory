image:
  repository: harbor.szymonrichert.pl/containers/tatara-memory
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: regcred

replicaCount: 1

httpAddr: ":8080"
lightragBaseUrl: "http://tatara-memory-lightrag:9621"
oidcIssuer: "https://auth.szymonrichert.pl/realms/master"
oidcAudience: "tatara-memory"
workerPoolSize: 4
logLevel: "info"
otlpEndpoint: ""

pgHost: "tatara-memory-postgres-cluster-rw"
pgPort: 5432
pgDb: "tatara_memory"
pgUser: "tatara_memory"

# Secrets are provided by external Secret objects (cnpg-managed, SOPS,
# or ExternalSecret). Set existingSecret to override the default
# generated by templates/secret.yaml.
existingSecret: ""
pgPasswordSecret: "tatara-memory-postgres-cluster-app"
pgPasswordKey: "password"
oidcClientSecret: ""

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  host: ""
  clusterIssuer: letsencrypt-prod
  tlsSecretName: ""

serviceMonitor:
  enabled: true
  interval: "30s"
  scrapeTimeout: "10s"

networkPolicy:
  enabled: true

postgres:
  enabled: true
  # cnpg/cluster subchart values pass through to the postgres cluster.
  # Both tatara_memory (for ingest jobs) and lightrag (PGKVStorage,
  # PGVectorStorage, PGDocStatusStorage) share this cluster as separate
  # databases owned by the same app user, with the pgvector extension
  # pre-installed for lightrag's vector store.
  cluster:
    initdb:
      database: tatara_memory
      owner: tatara_memory
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS vector;
        - CREATE DATABASE lightrag OWNER tatara_memory;
        - GRANT ALL ON DATABASE lightrag TO tatara_memory;

neo4j:
  enabled: true
  # neo4j chart requires `neo4j.name` and `volumes.data.mode` at top level.
  neo4j:
    name: tatara-neo4j
    edition: community
    acceptLicenseAgreement: "yes"
    passwordFromSecret: tatara-neo4j-password
    passwordFromSecretLookup: true
  volumes:
    data:
      mode: defaultStorageClass
  services:
    neo4j:
      enabled: true

lightrag:
  enabled: true
  # Share the parent cluster's postgres - lightrag's own database is
  # created by the cnpg cluster's postInitSQL above.
  postgresHost: tatara-memory-postgres-cluster-rw
  postgresPort: "5432"
  postgresDatabase: lightrag
  postgresUser: tatara_memory
  neo4jUri: neo4j://tatara-neo4j:7687
  secrets:
    openai:
      existingSecret: ""
      existingSecretKey: api-key
      value: ""
    postgres:
      existingSecret: tatara-memory-postgres-cluster-app
      existingSecretKey: password
      value: ""
    neo4j:
      existingSecret: tatara-neo4j-password
      existingSecretKey: password
      value: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi
