image:
  repository: harbor.szymonrichert.pl/tatara/tatara-memory
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: regcred

replicaCount: 1

httpAddr: ":8080"
lightragBaseUrl: "http://tatara-memory-lightrag:9621"
oidcIssuer: "https://auth.szymonrichert.pl/realms/master"
oidcAudience: "tatara-memory"
workerPoolSize: 4
logLevel: "info"
otlpEndpoint: ""

pgHost: "tatara-memory-postgres-cluster-rw"
pgPort: 5432
pgDb: "tatara_memory"
pgUser: "tatara_memory"

# Secrets are provided by external Secret objects (cnpg-managed, SOPS,
# or ExternalSecret). Set existingSecret to override the default
# generated by templates/secret.yaml.
existingSecret: ""
pgPasswordSecret: "tatara-memory-postgres-cluster-app"
pgPasswordKey: "password"
oidcClientSecret: ""

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  host: ""
  clusterIssuer: letsencrypt-prod
  tlsSecretName: ""

serviceMonitor:
  enabled: true
  interval: "30s"
  scrapeTimeout: "10s"

networkPolicy:
  enabled: true

postgres:
  enabled: true

neo4j:
  enabled: true

lightrag:
  enabled: true

serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi
